services:
  zeek:
    container_name: zeek
    image: zeek/zeek:latest
    restart: unless-stopped
    network_mode: host

    cap_add:
      - NET_ADMIN
      - NET_RAW

    volumes:
      - ./logs:/usr/local/zeek/logs
      - ./pcaps:/pcaps
      - ./scripts:/scripts

    working_dir: /usr/local/zeek

    command: >
      zeek -i enp0s3 -i enp0s8 localservices:
  zeek:
    container_name: zeek
    image: zeek/zeek:latest
    restart: unless-stopped

    network_mode: host  # required to access real interfaces

    cap_add:
      - NET_ADMIN
      - NET_RAW        # needed for raw packet capture

    volumes:
      - ./logs:/usr/local/zeek/logs
      - ./pcaps:/pcaps
      - ./scripts:/usr/local/zeek/share/zeek/site/scripts
      - ./zeek.cfg:/usr/local/zeek/etc/zeekctl.cfg:ro  # optional custom config

    environment:
      - ZEEK_DEFAULT_LISTEN_ADDRESS=0.0.0.0

    working_dir: /usr/local/zeek

    command: >
      zeek -i enp0s3 -i enp0s8
      /usr/local/zeek/share/zeek/site/local.zeek
      /usr/local/zeek/share/zeek/site/scripts/

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "prometheus"
    static_configs:
      - targets: ["172.18.0.3:9090"]

  - job_name: "loki"
    static_configs:
      - targets: ["172.18.0.7:3100"]

  - job_name: "alloy"
    static_configs:
      - targets: ["172.18.0.5:12345"]

  - job_name: "grafana"
    static_configs:
      - targets: ["172.18.0.4:3000"]

  - job_name: "cadvisor"
    static_configs:
      - targets: ["172.18.0.6:8080"]

  - job_name: "node"
    static_configs:
      - targets: ["172.18.0.2:9100"]
